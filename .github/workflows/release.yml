name: Auto Release (CalVer)

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release作成やコミットpushに必要
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # プロジェクトのバージョンに合わせてください
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Version (CalVer)
        id: calver
        run: |
          # タイムゾーンを日本時間(JST)にして日付を取得（先頭の0を取り除く形式）
          # TZの指定を`date`コマンドの実行時に正しく反映させるように修正
          DATE=$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')
          # SemVer（X.Y.Z形式）に合わせるため、複数回実行用のrun_numberをプレリリース番号として付与
          VERSION="${DATE}-${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Update package.json version
        run: |
          # Node.js を使って TOML ファイル内のバージョンを置換
          node -e "
            const fs = require('fs');
            const path = 'src/lib/licenses.manual.toml';
            let content = fs.readFileSync(path, 'utf8');
            const version = '${{ steps.calver.outputs.VERSION }}';
            // 'Portfolio Template' の直後にある version を置換
            content = content.replace(/(name\s*=\s*\"Portfolio Template\"[\s\S]*?version\s*=\s*\")[^\"]*(\")/, '\$1' + version + '\$2');
            fs.writeFileSync(path, content);
          "

          # package.json のバージョンを更新 (git tag はここでは作成しない)
          npm version ${{ steps.calver.outputs.VERSION }} --no-git-tag-version

      - name: Build Project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'portfolio-preview' # TODO: 実際のプロジェクト名に変更してください
          directory: 'build' # adapter-static の場合は 'build'、adapter-cloudflare の場合は '.svelte-kit/cloudflare' など
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Zip file
        run: |
          # node_modules や .git など不要なディレクトリを除外してプロジェクトのソースコード全体を ZIP 化
          zip -r "project-${{ steps.calver.outputs.VERSION }}.zip" . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".github/*" \
            -x ".wrangler/*" \
            -x ".svelte-kit/*" \
            -x "build/*" \
            -x ".DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.VERSION }}
          name: Release ${{ steps.calver.outputs.VERSION }}
          files: project-${{ steps.calver.outputs.VERSION }}.zip
          generate_release_notes: true

      - name: Push version bump
        if: success()
        run: |
          # 変更（licenses.manual.toml, package.json, package-lock.json）をコミットしてpush
          # [skip ci] をつけることで Cloudflare 側の自動ビルド（もし有効でも）をスキップさせます
          git commit -a -m "chore(release): bump version to ${{ steps.calver.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push
